name: 🚀 Deploy Hexo Blog to GitHub Pages
on:
  push:
    branches:
      - main
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout source
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: blog-data/package-lock.json

      - name: 🔍 Check config
        working-directory: blog-data
        run: grep -E "url:|root:" _config.yml

      - name: 📦 Install dependencies
        working-directory: blog-data
        run: npm ci

      - name: 🏗️ Build Hexo site
        working-directory: blog-data
        run: npx hexo generate
        env:
          TZ: Asia/Shanghai

      - name: 🔍 Check generated HTML
        run: grep "style.css" blog-data/public/index.html

      - name: 🌐 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./blog-data/public
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "🚀 Auto deploy"
