# ============================================================
# GitHub Actions — 自动构建并部署到 GitHub Pages
# 触发: push 到 main 分支
# ============================================================

name: 🚀 Deploy Hexo Blog to GitHub Pages

on:
  push:
    branches:
      - main          # 推送到 main 分支时触发
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write     # 允许写入 gh-pages 分支

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy

    steps:
      # ── 1. 检出源码 ─────────────────────────────────────────
      - name: 📥 Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── 2. 配置 Node.js ─────────────────────────────────────
      - name: ⚙️ Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: blog-data/package-lock.json

      # ── 3. 安装依赖 ─────────────────────────────────────────
      - name: 📦 Install dependencies
        working-directory: blog-data
        run: npm ci

      # ── 4. 构建静态文件 ─────────────────────────────────────
      - name: 🏗️ Build Hexo site
        working-directory: blog-data
        run: npx hexo generate
        env:
          TZ: Asia/Shanghai

      # ── 5. 部署到 gh-pages 分支 ─────────────────────────────
      - name: 🌐 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./blog-data/public
          publish_branch: gh-pages
          commit_message: "🚀 Auto deploy: ${{ github.event.head_commit.message }}"

      # ── 6. 部署成功通知 ─────────────────────────────────────
      - name: ✅ Deployment complete
        run: |
          echo "博客已成功部署到 GitHub Pages!"
          echo "访问地址: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
